[env:camera_esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
  -DCORE_MHZ=240
  -DCAMERA_FIRMWARE_VERSION=\"0.1.0\"

; Keep dependencies minimal for bring-up.
; Add esp32-camera or UVC stack dependencies once pin map and transport are finalized.
lib_deps =
  ArduinoJson @ ^7.4.2
