[env:follower_esp32]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
  -DCORE_MHZ=240
  -DOPERATION_MODE=1
  ; 1 = VLA_INFERENCE (default), 2 = TELEOPERATION (Phase 2)
monitor_speed = 115200

; Note: adjust upload_port/upload_protocol for your environment
lib_deps = 
  https://github.com/teemuatlut/TMCStepper.git
  ArduinoJson @ ^7.0.4
