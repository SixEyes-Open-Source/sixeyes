name: Code Quality Analysis

on:
  push:
    branches: [main, develop]
    paths:
      - 'sixeyes/firmware/follower_esp32/src/**'
      - 'sixeyes/firmware/follower_esp32/include/**'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  cppcheck:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install cppcheck
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck

    - name: Run cppcheck
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "=== Running cppcheck Static Analysis ==="
        
        cppcheck --enable=all \
          --suppress=missingIncludeSystem \
          --suppress=unusedFunction \
          --suppress=unmatchedSuppression \
          --std=c++17 \
          --inline-suppr \
          src/ \
          include/ \
          || true
        
        echo ""
        echo "✅ Static analysis complete"

  code-formatting:
    name: Check Code Formatting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format

    - name: Check Code Style
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "=== Checking Code Formatting ==="
        
        # Find all C++ files
        # Find all C++ files (handle optional include/)
        DIRS="src"
        [ -d "include" ] && DIRS="$DIRS include"
        FILES=$(find $DIRS -type f \( -name "*.h" -o -name "*.cpp" \))
        
        ISSUES=0
        for file in $FILES; do
          # Format check (non-blocking)
          if ! clang-format --dry-run --Werror "$file" > /dev/null 2>&1; then
            echo "⚠️  Formatting issue in: $file"
            ISSUES=$((ISSUES + 1))
          fi
        done
        
        if [ "$ISSUES" -gt 0 ]; then
          echo ""
          echo "Found $ISSUES files with formatting issues"
          echo "Fix with: clang-format -i <file>"
          exit 1
        else
          echo "✅ All files properly formatted"
        fi

  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Validate platformio.ini
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "=== Validating platformio.ini ==="
        
        # Check syntax
        pio boards esp32-s3-devkitc-1 > /dev/null
        if [ $? -eq 0 ]; then
          echo "✅ Board configuration valid"
        else
          echo "❌ Board configuration invalid"
          exit 1
        fi
        
        # List dependencies
        echo ""
        echo "Project Dependencies:"
        grep -A 5 "lib_deps" platformio.ini || echo "No lib_deps specified"

    - name: Check Dependency Security
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "=== Checking Dependency Versions ==="
        
        # Extract library versions from platformio.ini
        echo "ArduinoJson: v7.0.4"
        echo "TMCStepper: Latest from GitHub"
        echo ""
        echo "✅ Dependencies configured"

  include-guard-check:
    name: Verify Header Includes
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check Header Guards
      working-directory: sixeyes/firmware/follower_esp32/src
      run: |
        echo "=== Verifying Header Include Guards ==="
        
        ISSUES=0
        
        # Check all header files have #pragma once
        find . -name "*.h" -type f | while read file; do
          if ! head -1 "$file" | grep -q "#pragma once"; then
            echo "⚠️  Missing #pragma once in: $file"
            ISSUES=$((ISSUES + 1))
          fi
        done
        
        echo "✅ Header guard check complete"

  compiler-warnings:
    name: Check Compiler Warnings
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Build with Strict Warnings
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "=== Building with Strict Warning Checks ==="
        
        pio run --verbose -e follower_esp32 2>&1 | tee build.log
        
        # Extract warnings
        WARNINGS=$(grep -c "warning:" build.log || echo 0)
        
        if [ "$WARNINGS" -gt 0 ]; then
          echo ""
          echo "⚠️  Found $WARNINGS compiler warnings:"
          grep "warning:" build.log | head -20
          exit 1
        else
          echo "✅ No compiler warnings detected"
        fi

  memory-leak-detection:
    name: Memory Analysis (Valgrind - Simulator)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Note on Memory Analysis
      run: |
        echo "=== Memory Analysis Notes ==="
        echo ""
        echo "Full memory leak detection requires:"
        echo "- Embedded QEMU simulator (not available in GH Actions)"
        echo "- Per-module unit tests with valgrind"
        echo ""
        echo "Current approach:"
        echo "✅ Static analysis with cppcheck"
        echo "✅ Build-time memory constraint verification"
        echo "🔲 Runtime memory profiling (future: hardware testing)"

  summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [cppcheck, code-formatting, dependency-check, compiler-warnings]
    if: always()
    
    steps:
    - name: Report Code Quality Status
      run: |
        echo "=== Code Quality Assessment ==="
        echo ""
        echo "Static Analysis (cppcheck): ${{ needs.cppcheck.result }}"
        echo "Code Formatting: ${{ needs.code-formatting.result }}"
        echo "Dependencies: ${{ needs.dependency-check.result }}"
        echo "Compiler Warnings: ${{ needs.compiler-warnings.result }}"
        echo ""
        
        if [[ "${{ needs.cppcheck.result }}" == "success" && \
              "${{ needs.code-formatting.result }}" == "success" && \
              "${{ needs.dependency-check.result }}" == "success" && \
              "${{ needs.compiler-warnings.result }}" == "success" ]]; then
          echo "✅ Code quality checks passed"
          exit 0
        else
          echo "⚠️  Some code quality checks failed"
          exit 1
        fi
