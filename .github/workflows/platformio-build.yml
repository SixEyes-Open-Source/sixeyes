name: Build Firmware

on:
  push:
    branches: [main, develop]
    paths:
      - 'sixeyes/firmware/follower_esp32/src/**'
      - 'sixeyes/firmware/follower_esp32/include/**'
      - 'sixeyes/firmware/follower_esp32/platformio.ini'
      - '.github/workflows/platformio-build.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'sixeyes/firmware/follower_esp32/**'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-firmware:
    name: Build ESP32-S3 Firmware
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        environment:
          - follower_esp32
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for version detection

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Cache PlatformIO packages
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-

    - name: Run PlatformIO Build
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        pio run -e ${{ matrix.environment }} --verbose
      continue-on-error: false

    - name: Check Memory Usage
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "=== Build Artifact Summary ==="
        pio run -e ${{ matrix.environment }} --target size
        
        # Extract memory statistics
        MEMORY_OUTPUT=$(pio run -e ${{ matrix.environment }} --target size 2>&1 | tail -20)
        echo "Memory Usage Report:"
        echo "$MEMORY_OUTPUT"
        
        # Parse RAM usage and fail if > 80%
        RAM_USAGE=$(echo "$MEMORY_OUTPUT" | grep -oP 'RAM:\s*\[\K[^%]+' | head -1)
        FLASH_USAGE=$(echo "$MEMORY_OUTPUT" | grep -oP 'Flash:\s*\[\K[^%]+' | head -1)
        
        echo "RAM Usage: $RAM_USAGE%"
        echo "Flash Usage: $FLASH_USAGE%"
        
        # Check thresholds
        RAM_NUM=$(echo "$RAM_USAGE" | tr -d '[%=]' | awk '{print $NF}' | tr '.' ',')
        FLASH_NUM=$(echo "$FLASH_USAGE" | tr -d '[%=]' | awk '{print $NF}' | tr '.' ',')
        
        if (( $(echo "80 < $RAM_NUM" | bc -l) )); then
          echo "⚠️  WARNING: RAM usage exceeds 80%"
          exit 1
        fi
        
        if (( $(echo "80 < $FLASH_NUM" | bc -l) )); then
          echo "⚠️  WARNING: Flash usage exceeds 80%"
          exit 1
        fi

    - name: Upload Build Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: firmware-${{ matrix.environment }}-${{ github.run_number }}
        path: |
          sixeyes/firmware/follower_esp32/.pio/build/follower_esp32/firmware.bin
          sixeyes/firmware/follower_esp32/.pio/build/follower_esp32/firmware.elf
          sixeyes/firmware/follower_esp32/.pio/build/follower_esp32/firmware.map
        retention-days: 30

    - name: Generate Build Report
      if: always()
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "# Build Report" > build_report.md
        echo "" >> build_report.md
        echo "**Environment**: ${{ matrix.environment }}" >> build_report.md
        echo "**Date**: $(date)" >> build_report.md
        echo "**Git Commit**: ${{ github.sha }}" >> build_report.md
        echo "" >> build_report.md
        echo "## Build Status" >> build_report.md
        
        if pio run -e ${{ matrix.environment }} > /dev/null 2>&1; then
          echo "✅ **PASSED**" >> build_report.md
          
          echo "" >> build_report.md
          echo "## Memory Summary" >> build_report.md
          echo "\`\`\`" >> build_report.md
          pio run -e ${{ matrix.environment }} --target size | tail -5 >> build_report.md
          echo "\`\`\`" >> build_report.md
          
          echo "" >> build_report.md
          echo "## Artifacts" >> build_report.md
          echo "- \`firmware.bin\`: $(stat -c%s .pio/build/follower_esp32/firmware.bin) bytes" >> build_report.md
          echo "- \`firmware.elf\`: $(stat -c%s .pio/build/follower_esp32/firmware.elf) bytes" >> build_report.md
        else
          echo "❌ **FAILED**" >> build_report.md
        fi
        
        cat build_report.md

    - name: Comment PR with Build Results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          const buildReport = fs.readFileSync(
            path.join(process.env.GITHUB_WORKSPACE, 
              'sixeyes/firmware/follower_esp32/build_report.md'),
            'utf-8'
          );
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: buildReport
          });

    - name: Check Build Warnings
      if: always()
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        echo "Checking for compilation warnings..."
        BUILD_OUTPUT=$(pio run -e ${{ matrix.environment }} --verbose 2>&1)
        
        # Count warnings
        WARNING_COUNT=$(echo "$BUILD_OUTPUT" | grep -c "warning:" || echo 0)
        
        if [ "$WARNING_COUNT" -gt 0 ]; then
          echo "⚠️  Found $WARNING_COUNT warnings"
          echo "$BUILD_OUTPUT" | grep "warning:" | head -20
          exit 1
        else
          echo "✅ No warnings detected"
        fi

  test-build-sizes:
    name: Verify Build Size Constraints
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Cache PlatformIO packages
      uses: actions/cache@v3
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-platformio-

    - name: Build and Analyze Size
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        pio run
        
        echo "=== Memory Constraint Verification ==="
        echo ""
        echo "Constraints (from board_config.h):"
        echo "- ESP32-S3 Total RAM: 320 KB"
        echo "- FreeRTOS Heap: 256 KB"
        echo "- Stack: 64 KB"
        echo "- Max App Firmware: 3.3 MB (must < 80%)"
        echo ""
        
        # Get actual sizes
        FIRMWARE_SIZE=$(stat -c%s .pio/build/follower_esp32/firmware.bin)
        MAX_APP=$(( 3342336 * 80 / 100 ))
        
        echo "Actual Firmware Size: $FIRMWARE_SIZE bytes"
        echo "Maximum Allowed: $MAX_APP bytes"
        echo ""
        
        if [ "$FIRMWARE_SIZE" -gt "$MAX_APP" ]; then
          echo "❌ FAILED: Firmware exceeds 80% of flash"
          exit 1
        else
          PCT=$(( FIRMWARE_SIZE * 100 / 3342336 ))
          echo "✅ PASSED: Using $PCT% of flash"
        fi

  lint-code:
    name: Lint Code (cpplint)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install cpplint
      run: pip install cpplint

    - name: Run cpplint on Source Files
      working-directory: sixeyes/firmware/follower_esp32/src
      run: |
        echo "Linting C++ source files..."
        
        # Configure cpplint rules
        CPPLINT_ARGS="--linelength=120 --filter=-whitespace/comments,-whitespace/line_length"
        
        # Run linter (non-blocking)
        find . -name "*.h" -o -name "*.cpp" | while read file; do
          echo "Checking: $file"
          cpplint $CPPLINT_ARGS "$file" || true
        done
        
        echo ""
        echo "⚠️  Note: Style warnings logged but are non-blocking"

  build-documentation:
    name: Build API Documentation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Doxygen
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen

    - name: Generate Doxygen Documentation
      working-directory: sixeyes/firmware/follower_esp32
      run: |
        # Create a simple Doxyfile for code documentation
        cat > Doxyfile << 'EOF'
        PROJECT_NAME           = "SixEyes Firmware"
        PROJECT_VERSION        = "1.0.0"
        INPUT                  = src
        OUTPUT_DIRECTORY       = ./doc
        RECURSIVE              = YES
        EXTRACT_ALL            = YES
        EXTRACT_PRIVATE        = YES
        GENERATE_HTML          = YES
        GENERATE_LATEX         = NO
        QUIET                  = YES
        EOF
        
        doxygen Doxyfile || true
        
        # Verify generated docs
        if [ -d "./doc/html" ]; then
          echo "✅ Documentation generated successfully"
          echo "   Files: $(find ./doc/html -name '*.html' | wc -l) HTML files"
        else
          echo "⚠️  Documentation generation had issues"
        fi

  summary:
    name: Build Status Summary
    runs-on: ubuntu-latest
    needs: [build-firmware, test-build-sizes]
    if: always()
    
    steps:
    - name: Print Summary
      run: |
        echo "=== Build Pipeline Summary ==="
        echo "✅ Firmware Build: ${{ needs.build-firmware.result }}"
        echo "✅ Size Verification: ${{ needs.test-build-sizes.result }}"
        
        if [[ "${{ needs.build-firmware.result }}" == "success" && "${{ needs.test-build-sizes.result }}" == "success" ]]; then
          echo ""
          echo "🎉 All checks passed!"
          exit 0
        else
          echo ""
          echo "❌ Some checks failed"
          exit 1
        fi
